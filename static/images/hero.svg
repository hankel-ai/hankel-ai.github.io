<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- Desk/workspace illustration -->
  <!-- Monitor -->
  <rect x="150" y="60" width="300" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <rect x="165" y="75" width="270" height="170" rx="4" fill="#0f172a"/>
  <!-- Code lines on screen -->
  <rect x="180" y="95" width="80" height="6" rx="3" fill="#22d3ee" opacity="0.8"/>
  <rect x="180" y="112" width="120" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <rect x="195" y="129" width="100" height="6" rx="3" fill="#a78bfa" opacity="0.6"/>
  <rect x="195" y="146" width="140" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <rect x="195" y="163" width="60" height="6" rx="3" fill="#34d399" opacity="0.7"/>
  <rect x="180" y="180" width="90" height="6" rx="3" fill="#22d3ee" opacity="0.8"/>
  <rect x="180" y="197" width="130" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <rect x="195" y="214" width="80" height="6" rx="3" fill="#fb923c" opacity="0.6"/>
  <!-- K8s wheel icon on screen -->
  <g transform="translate(370, 155)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#326CE5" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="8" fill="#326CE5" opacity="0.7"/>
    <circle cx="0" cy="-22" r="6" fill="#326CE5" opacity="0.7"/>
    <circle cx="19" cy="11" r="6" fill="#326CE5" opacity="0.7"/>
    <circle cx="-19" cy="11" r="6" fill="#326CE5" opacity="0.7"/>
    <circle cx="19" cy="-11" r="6" fill="#326CE5" opacity="0.7"/>
    <circle cx="-19" cy="-11" r="6" fill="#326CE5" opacity="0.7"/>
    <circle cx="0" cy="22" r="6" fill="#326CE5" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="19" y2="11" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="-19" y2="11" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="19" y2="-11" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="-19" y2="-11" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- Monitor stand -->
  <rect x="270" y="260" width="60" height="30" fill="#334155"/>
  <rect x="240" y="285" width="120" height="10" rx="5" fill="#334155"/>
  <!-- Keyboard -->
  <rect x="180" y="310" width="240" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <g fill="#334155">
    <rect x="195" y="322" width="18" height="12" rx="2"/>
    <rect x="218" y="322" width="18" height="12" rx="2"/>
    <rect x="241" y="322" width="18" height="12" rx="2"/>
    <rect x="264" y="322" width="18" height="12" rx="2"/>
    <rect x="287" y="322" width="18" height="12" rx="2"/>
    <rect x="310" y="322" width="18" height="12" rx="2"/>
    <rect x="333" y="322" width="18" height="12" rx="2"/>
    <rect x="356" y="322" width="18" height="12" rx="2"/>
    <rect x="195" y="342" width="18" height="12" rx="2"/>
    <rect x="218" y="342" width="18" height="12" rx="2"/>
    <rect x="241" y="342" width="90" height="12" rx="2"/>
    <rect x="336" y="342" width="18" height="12" rx="2"/>
    <rect x="359" y="342" width="18" height="12" rx="2"/>
  </g>
  <!-- Coffee mug -->
  <rect x="460" y="290" width="35" height="40" rx="4" fill="#475569"/>
  <path d="M495 300 Q510 300 510 315 Q510 325 495 325" stroke="#475569" stroke-width="3" fill="none"/>
  <path d="M467 285 Q472 275 477 285" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M477 282 Q482 270 487 282" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Terminal cursor blink -->
  <rect x="275" y="197" width="3" height="10" fill="#22d3ee" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
