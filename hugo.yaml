baseURL: "https://hankel.ai"
languageCode: "en-us"
title: "John Hankel"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 10

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: projects
      name: Projects
      title: Projects
      url: /#projects
      weight: 1
    - identifier: about
      name: About
      title: About
      url: /#about
      weight: 2
    - identifier: contact
      name: Contact
      title: Contact
      url: /#contact
      weight: 3

params:
  title: "John Hankel"
  description: "Technical portfolio of John Hankel - Kubernetes, Cloud Infrastructure, and AI Engineering"
  favicon: "/fav.svg"

  useBootstrapCDN: false
  mathjax: false
  animate: true

  theme:
    defaultTheme: "dark"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  color:
    darkmode:
      textColor: "#e2e8f0"
      secondaryTextColor: "#94a3b8"
      textLinkColor: "#60a5fa"
      backgroundColor: "#0f172a"
      secondaryBackgroundColor: "#1e293b"
      primaryColor: "#60a5fa"
      secondaryColor: "#1e293b"

  navbar:
    align: ms-auto
    brandName: "hankel.ai"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: true
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, I'm"
    title: "John Hankel."
    subtitle: "CKA-certified Kubernetes engineer & AI developer"
    content: "25 years in IT. I architect cloud migrations on OpenShift/EKS/GKE/AKS, build production Helm charts, and develop AI-integrated tools that solve real problems. Currently focused on Kubernetes orchestration and AI-assisted engineering."
    image: /images/hero.svg
    bottomImage:
      enable: true
    button:
      enable: true
      name: "View Projects"
      url: "#projects"
      download: false
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/hankel-ai
        - icon: fa fa-envelope
          url: mailto:john@hankel.ai

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.svg"
    content: |-
      I've spent 25 years building and migrating enterprise infrastructure -- from managing 60+ servers across international data centers to architecting multi-year cloud migrations on Red Hat OpenShift and AWS. I hold a CKA certification and have hands-on experience with managed Kubernetes across all three major clouds.

      Outside of work, I run a 3-node K3s cluster where I build production Helm charts, and I develop AI-powered tools using Claude Code, LLM APIs, and local models. I'm particularly interested in the intersection of container orchestration and AI -- building systems that are both well-architected and practically useful.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Kubernetes (EKS, GKE, AKS, OpenShift)"
        - "Helm / Terraform"
        - "AWS / GCP / Azure"
        - "Docker"
        - "Python / Java"
        - "Claude Code / GitHub Copilot"
        - "Azure Entra ID / SAML / OAuth"
        - "Linux (RHEL, Ubuntu)"
        - "PostgreSQL / Oracle"
        - "CI/CD / GitLab / GitHub Actions"
        - "Bash / PowerShell"
        - "FastAPI / REST"
        - "Longhorn Storage"
        - "Linux / Bash"
        - "PowerShell"
        - "iptables / Networking"

  # Experience (disabled - not a resume site)
  experience:
    enable: false

  # Education (disabled - not a resume site)
  education:
    enable: false

  # Certifications
  achievements:
    enable: true
    title: "Certifications"
    items:
      - title: "Certified Kubernetes Administrator (CKA)"
        content: "Cloud Native Computing Foundation — 2024"
      - title: "Cisco CCNA Security"
        content: "Routing & Switching and Security — 2018"
      - title: "Red Hat Certified Technician (RHCT)"
        content: "Red Hat — 2010"
      - title: "CompTIA Security+"
        content: "CompTIA — 2010"

  # Projects
  projects:
    enable: true
    title: "Projects"
    items:
      - title: "AI Commit"
        content: "AI-powered git commit message generator using local Ollama models. Includes a CLI for single-repo workflows and a Dear PyGui GUI monitor that auto-scans directories for repos, generates conventional commit messages from diffs, and supports accept/regenerate/edit flows with system tray integration."
        image: /images/projects/ai-commit.png
        badges:
          - "Python"
          - "Ollama"
          - "Dear PyGui"
          - "Git"
        links:
          - icon: fab fa-github
            url: https://github.com/hankel-ai/ai-commit

      - title: "AI Podcast Pipeline"
        content: "Automated AI news aggregation system that scrapes 13+ sources daily, generates podcast scripts via LLM (Claude API or local Ollama), synthesizes audio with neural TTS, and delivers to Telegram and Discord. Features async concurrent fetching, deduplication, and graceful fallback across generation modes."
        image: /images/projects/ai-podcast.png
        badges:
          - "Python"
          - "Claude API"
          - "Ollama"
          - "Edge TTS"
          - "Telegram Bot"
          - "Async"
        links:
          - icon: fab fa-github
            url: https://github.com/hankel-ai/ai-podcast

      - title: "NetGuard"
        content: "Network access control system using ARP/NDP cache poisoning for agentless device management. Features a FastAPI backend with per-device scheduling, real-time bandwidth monitoring, Pi-hole DNS integration, and an auto-restoring safety mechanism. Dual-stack IPv4/IPv6 support."
        image: /images/projects/netguard.png
        badges:
          - "Python"
          - "FastAPI"
          - "Scapy"
          - "Docker"
          - "iptables"
          - "Raspberry Pi"
        links:
          - icon: fab fa-github
            url: https://github.com/hankel-ai/netguard

      - title: "LLM API Bridge"
        content: "Protocol-translating proxy that bridges Anthropic and OpenAI API formats, enabling any AI coding tool to use alternative models. Implements bidirectional streaming SSE, full tool calling translation between incompatible schemas, and transparent web search. Zero dependencies -- Python stdlib only."
        image: /images/projects/llm-bridge.png
        badges:
          - "Python"
          - "SSE Streaming"
          - "API Design"
          - "Zero Dependencies"
        links:
          - icon: fab fa-github
            url: https://github.com/hankel-ai/llm-bridge

      - title: "Claude Usage Monitor"
        content: "Real-time Windows desktop widget for monitoring Claude AI rate limits. Features animated utilization meters with color-coded thresholds, OAuth token integration, configurable polling, and single-file deployment via .NET 8 self-contained publish."
        image: /images/projects/claude-usage-monitor.png
        badges:
          - "C#"
          - ".NET 8"
          - "WPF"
          - "XAML"
        links:
          - icon: fab fa-github
            url: https://github.com/hankel-ai/claude-usage-monitor

  # Contact
  contact:
    enable: true
    content: "Feel free to reach out if you'd like to discuss Kubernetes, AI systems, or infrastructure engineering."
    btnName: Email me
    btnLink: mailto:john@hankel.ai

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: false
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/hankel-ai

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"
